<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      padding: 16px;
      background: #f3f2ef;
      color: #1d2226;
    }
    h1 {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 12px;
      color: #0a66c2;
    }
    .mode-toggle {
      display: flex;
      border-radius: 6px;
      overflow: hidden;
      margin-bottom: 12px;
      border: 1px solid #0a66c2;
    }
    .mode-toggle label {
      flex: 1;
      text-align: center;
      padding: 8px;
      font-size: 13px;
      cursor: pointer;
      background: white;
      color: #0a66c2;
      font-weight: 500;
      transition: all 0.15s;
    }
    .mode-toggle input { display: none; }
    .mode-toggle input:checked + label {
      background: #0a66c2;
      color: white;
    }
    .mode-hint {
      font-size: 11px;
      color: #666;
      margin-bottom: 12px;
      line-height: 1.4;
    }
    #scrapeBtn {
      width: 100%;
      padding: 10px;
      background: #0a66c2;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    #scrapeBtn:hover { background: #004182; }
    #scrapeBtn:disabled {
      background: #86b7e8;
      cursor: not-allowed;
    }
    #status {
      margin-top: 12px;
      font-size: 12px;
      color: #444;
      min-height: 18px;
    }
    .progress-bar {
      width: 100%;
      height: 4px;
      background: #ddd;
      border-radius: 2px;
      margin-top: 8px;
      overflow: hidden;
      display: none;
    }
    .progress-bar .fill {
      height: 100%;
      background: #0a66c2;
      border-radius: 2px;
      transition: width 0.3s;
      width: 0%;
    }
    .error { color: #cc1016; }
    .success { color: #057642; }
  </style>
</head>
<body>
  <h1>LinkedIn Job Scraper</h1>

  <div class="mode-toggle">
    <input type="radio" name="mode" id="modeFast" value="fast" checked>
    <label for="modeFast">Fast</label>
    <input type="radio" name="mode" id="modeFull" value="full">
    <label for="modeFull">Full</label>
  </div>

  <div class="mode-hint" id="modeHint">
    Card-level data only. No descriptions or apply URLs.
  </div>

  <button id="scrapeBtn">Scrape Jobs</button>

  <div id="status"></div>
  <div class="progress-bar" id="progressBar">
    <div class="fill" id="progressFill"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
